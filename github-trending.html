<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub 开源项目升星雷达</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a10;
      --panel: rgba(255, 255, 255, .07);
      --panel-strong: rgba(255, 255, 255, .12);
      --text: #f5f7fb;
      --muted: #aab4c4;
      --line: rgba(255, 255, 255, .13);
      --hot: #ff5f7e;
      --gold: #ffd166;
      --mint: #4ee6a5;
      --cyan: #56ccf2;
      --violet: #b98cff;
      --shadow: 0 24px 80px rgba(0, 0, 0, .42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 95, 126, .22), transparent 28rem),
        radial-gradient(circle at 85% 5%, rgba(86, 204, 242, .16), transparent 26rem),
        radial-gradient(circle at 75% 90%, rgba(78, 230, 165, .12), transparent 24rem),
        linear-gradient(135deg, #080a10 0%, #111827 52%, #07080d 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, #000, transparent 88%);
    }

    a { color: inherit; text-decoration: none; }

    .page {
      position: relative;
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 38px 0 54px;
    }

    .hero {
      min-height: 278px;
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, .75fr);
      gap: 24px;
      align-items: end;
      padding-bottom: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 42px;
      height: 2px;
      background: linear-gradient(90deg, var(--hot), var(--gold), var(--mint));
      border-radius: 10px;
    }

    h1 {
      margin: 16px 0 16px;
      max-width: 850px;
      font-size: clamp(40px, 7vw, 86px);
      line-height: .92;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.75;
    }

    .source-panel {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.045));
      box-shadow: var(--shadow);
      border-radius: 8px;
      padding: 18px;
      backdrop-filter: blur(18px);
    }

    .source-panel b {
      display: block;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .source-stat {
      min-height: 86px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.11);
      background: rgba(0,0,0,.18);
      border-radius: 8px;
    }

    .source-stat strong {
      display: block;
      font-size: 26px;
      line-height: 1;
    }

    .source-stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0 18px;
      backdrop-filter: blur(18px);
    }

    .tabs {
      display: inline-grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      border: 1px solid var(--line);
      background: rgba(9, 12, 20, .78);
      border-radius: 8px;
      box-shadow: 0 12px 45px rgba(0,0,0,.24);
    }

    .tab {
      min-width: 110px;
      border: 0;
      border-radius: 6px;
      padding: 11px 16px;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      font: inherit;
      font-weight: 800;
    }

    .tab.active {
      color: #10141d;
      background: linear-gradient(135deg, var(--gold), var(--mint));
      box-shadow: 0 10px 30px rgba(78, 230, 165, .16);
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      line-height: 1.55;
    }

    .meta a {
      color: var(--cyan);
      border-bottom: 1px solid rgba(86, 204, 242, .45);
    }

    .notice {
      display: none;
      margin: 0 0 18px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 209, 102, .28);
      background: rgba(255, 209, 102, .09);
      color: #ffe6a5;
      border-radius: 8px;
      font-size: 14px;
    }

    .notice.show { display: block; }

    .ranking {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .repo-card {
      position: relative;
      min-height: 212px;
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.055)),
        rgba(10, 14, 24, .72);
      box-shadow: 0 16px 50px rgba(0,0,0,.28);
      overflow: hidden;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }

    .repo-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 209, 102, .46);
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.065)),
        rgba(10, 14, 24, .84);
    }

    .repo-card::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 3px;
      background: linear-gradient(90deg, var(--hot), var(--gold), var(--mint), var(--cyan), var(--violet));
      transform: scaleX(var(--heat));
      transform-origin: left;
    }

    .rank {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 8px;
      font-size: 25px;
      font-weight: 950;
      background: rgba(255,255,255,.08);
    }

    .avatar {
      width: 58px;
      height: 58px;
      margin-top: 12px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.18);
      background: #151a24;
    }

    .repo-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .repo-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .repo-name {
      min-width: 0;
    }

    .repo-name h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      word-break: break-word;
    }

    .repo-name span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .gain {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 8px;
      color: #10141d;
      background: linear-gradient(135deg, var(--gold), var(--hot));
      font-size: 13px;
      font-weight: 950;
      white-space: nowrap;
    }

    .summary {
      margin: 0;
      color: #d9e0ec;
      line-height: 1.65;
      font-size: 14px;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(0,0,0,.18);
      color: var(--muted);
      font-size: 12px;
    }

    .lang-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
    }

    .open {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 8px;
      color: #10141d;
      background: linear-gradient(135deg, var(--mint), var(--cyan));
      font-size: 13px;
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .toolbar { position: relative; align-items: stretch; flex-direction: column; }
      .meta { text-align: left; }
      .ranking { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .page { width: min(100% - 20px, 1220px); padding-top: 24px; }
      .source-grid { grid-template-columns: 1fr; }
      .tabs { width: 100%; }
      .tab { min-width: 0; padding-inline: 8px; }
      .repo-card { grid-template-columns: 54px minmax(0, 1fr); padding: 14px; }
      .rank, .avatar { width: 46px; height: 46px; }
      .rank { font-size: 20px; }
      .repo-top { flex-direction: column; }
      .gain { align-self: flex-start; }
    }
  </style>
</head>

    const langColors = {
      TypeScript: "#56ccf2", Python: "#ffd166", JavaScript: "#f7df1e", Rust: "#ff8a5b",
      Shell: "#89e051", HTML: "#ff5f7e", "C#": "#b98cff", Swift: "#ff9f43", Text: "#aab4c4"
    };

    const ranking = document.querySelector("#ranking");
    const notice = document.querySelector("#notice");
    const stats = document.querySelector("#stats");

    function format(n) {
      return new Intl.NumberFormat("en-US").format(n);
    }

    function avatar(repo) {
      return `https://github.com/${repo.split("/")[0]}.png?size=120`;
    }

    function renderStats() {
      stats.innerHTML = Object.entries(periods).map(([key, data]) => {
        const total = data.items.reduce((sum, item) => sum + item.gained, 0);
        return `<div class="source-stat"><strong>${data.items.length}</strong><span>${data.label}条目<br>合计新增 ${format(total)}</span></div>`;
      }).join("");
    }

    function render(period) {
      const data = periods[period];
      const max = Math.max(...data.items.map(item => item.gained));
      notice.textContent = data.items.length < data.limit
        ? `${data.label}官方 Trending 当前只返回 ${data.items.length} 个条目，页面保留全部可用项目。`
        : "";
      notice.classList.toggle("show", data.items.length < data.limit);

      ranking.innerHTML = data.items.map((item, index) => {
        const [owner, name] = item.repo.split("/");
        const heat = Math.max(.08, item.gained / max).toFixed(3);
        const color = langColors[item.lang] || "#aab4c4";
        return `
          <a class="repo-card" href="${item.url}" target="_blank" rel="noreferrer" style="--heat:${heat}" aria-label="打开 ${item.repo}">
            <div>
              <div class="rank">${index + 1}</div>
              <img class="avatar" src="${avatar(item.repo)}" alt="${owner} avatar" loading="lazy">
            </div>
            <div class="repo-main">
              <div class="repo-top">
                <div class="repo-name">
                  <h2>${name}</h2>
                  <span>${owner}</span>
                </div>
                <div class="gain">+${format(item.gained)}</div>
              </div>
              <p class="summary">${item.summary}</p>
              <p class="desc">${item.desc}</p>
              <div class="chips">
                <span class="chip"><i class="lang-dot" style="background:${color}"></i>${item.lang || "Unknown"}</span>
                <span class="chip">Total ★ ${item.stars}</span>
                <span class="chip">Forks ${item.forks}</span>
                <span class="open">打开项目</span>
              </div>
            </div>
          </a>`;
      }).join("");
    }

    document.querySelectorAll(".tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
        button.classList.add("active");
        render(button.dataset.period);
      });
    });

    renderStats();
    render("daily");
  </script>
